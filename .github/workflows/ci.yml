name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "img/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "img/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Prefetch dependencies
        run: mvn -B -DskipTests dependency:go-offline

      - name: Build
        run: mvn -B clean compile

      - name: Test
        run: mvn -B test
